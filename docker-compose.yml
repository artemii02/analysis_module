services:
  postgres:
    image: postgres:16-alpine
    container_name: analysis-module-postgres
    environment:
      POSTGRES_DB: analysis_module
      POSTGRES_USER: analysis
      POSTGRES_PASSWORD: analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analysis -d analysis_module"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: analysis-module-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  analysis-module:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analysis-module-app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      ANALYSIS_API_KEY: demo-api-key
      ANALYSIS_LLM_MODE: ollama
      ANALYSIS_JOB_STORE_BACKEND: postgres
      ANALYSIS_DATABASE_URL: postgresql://analysis:analysis@postgres:5432/analysis_module
      ANALYSIS_OLLAMA_URL: http://ollama:11434/api/generate
      ANALYSIS_OLLAMA_MODEL: qwen2.5:3b
      ANALYSIS_REQUEST_TIMEOUT_SECONDS: 300
      ANALYSIS_KNOWLEDGE_LIMIT: 1
      ANALYSIS_HARD_TIMEOUT_SECONDS: 30
      ANALYSIS_MAX_ANSWER_LENGTH: 4000
      ANALYSIS_MAX_SESSION_ITEMS: 20
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/assessment/v1/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  ollama_data:
